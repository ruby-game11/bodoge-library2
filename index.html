<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ほどげ部ライブラリ</title>
  <style>
    :root { --bg:#0b0c10; --card:#111318; --text:#f4f4f5; --muted:#a1a1aa; --line:#27272a; }
    body{ margin:0; font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background:linear-gradient(180deg,#0b0c10,#07070a); color:var(--text); }
    header{ padding:24px 16px 10px; max-width:1100px; margin:0 auto; }
    h1{ margin:0; font-size:26px; letter-spacing:.04em; }
    .sub{ color:var(--muted); margin-top:6px; font-size:14px; }
    .wrap{ max-width:1100px; margin:0 auto; padding:0 16px 28px; }

    .panel{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:16px; padding:14px; }
    .controls{ display:grid; grid-template-columns: 1.4fr .8fr .8fr .8fr; gap:10px; }
    @media (max-width:900px){ .controls{ grid-template-columns: 1fr 1fr; } }
    @media (max-width:520px){ .controls{ grid-template-columns: 1fr; } }

    label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
    input, select{ width:100%; box-sizing:border-box; padding:10px 12px; border-radius:12px;
      border:1px solid var(--line); background:#0d0f14; color:var(--text); outline:none; }
    input::placeholder{ color:#71717a; }

    .meta{ display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:10px; color:var(--muted); font-size:12px; }
    .btn{ cursor:pointer; padding:8px 10px; border-radius:12px; border:1px solid var(--line); background:#0d0f14; color:var(--text); }
    .btn:hover{ filter:brightness(1.1); }

    .grid{ margin-top:14px; display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
    @media (max-width:1000px){ .grid{ grid-template-columns: repeat(3, 1fr); } }
    @media (max-width:720px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (max-width:420px){ .grid{ grid-template-columns: 1fr; } }

    .card{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; min-height:170px; }
    .thumb{ height:110px; background:#0d0f14; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:#71717a; font-size:12px; }
    .thumb img{ width:100%; height:110px; object-fit:cover; display:block; }
    .content{ padding:12px; display:flex; flex-direction:column; gap:6px; }
    .title{ font-weight:700; font-size:15px; line-height:1.2; }
    .row{ color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .pill{ border:1px solid var(--line); border-radius:999px; padding:3px 8px; background:rgba(255,255,255,.02); }
    .note{ color:#d4d4d8; font-size:12px; opacity:.9; margin-top:2px; }

    .footer{ padding:10px 16px 26px; max-width:1100px; margin:0 auto; color:var(--muted); font-size:12px; }
    a{ color:#93c5fd; text-decoration:none; }
  </style>
</head>
<body>
  <header>
    <h1>ほどげ部ライブラリ</h1>
    <div class="sub">みんなの所持ボードゲームを検索・絞り込みできる共有ページ</div>
  </header>

  <div class="wrap">
    <div class="panel">
      <div class="controls">
        <div>
          <label>タイトル検索</label>
          <input id="q" placeholder="例：カタン / ドミニオン / テラフォ…" />
        </div>
        <div>
          <label>人数（含まれるゲーム）</label>
          <select id="players">
            <option value="">指定なし</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人以上</option>
          </select>
        </div>
        <div>
          <label>プレイ時間（分）</label>
          <select id="time">
            <option value="">指定なし</option>
            <option value="30">〜30</option>
            <option value="60">〜60</option>
            <option value="90">〜90</option>
            <option value="9999">90以上</option>
          </select>
        </div>
        <div>
          <label>所持者</label>
          <select id="owner">
            <option value="">全員</option>
          </select>
        </div>
      </div>

      <div class="meta">
        <div><span id="count">0</span> 件</div>
        <button class="btn" id="reset">リセット</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    データ更新：Googleスプレッドシートに追加するだけ。画像URLは任意です。<br/>
    作成：ほどげ部ライブラリ（GitHub Pages）
  </div>

<script>
  // ★ここを自分のCSV URLに差し替え
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrNGoGsxMqbG2ne7A9eSSCRBSKPfo_6llIEZ6pO1KTX3Le8rA6pgLwYl-cyVXbdaa-dlGIVEE2wSax/pub?gid=0&single=true&output=csv";
  const els = {
    q: document.getElementById("q"),
    players: document.getElementById("players"),
    time: document.getElementById("time"),
    owner: document.getElementById("owner"),
    grid: document.getElementById("grid"),
    count: document.getElementById("count"),
    reset: document.getElementById("reset"),
  };

  let all = [];

  function parseCSV(text) {
    // ざっくりCSV（Google gviz CSV想定：ダブルクォート対応）
    const rows = [];
    let row = [], cur = "", inQ = false;
    for (let i=0; i<text.length; i++){
      const c = text[i];
      if (c === '"' ) {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        row.push(cur); cur = "";
      } else if ((c === '\n' || c === '\r') && !inQ) {
        if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
        cur = ""; row = [];
        if (c === '\r' && text[i+1] === '\n') i++;
      } else {
        cur += c;
      }
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }

    const header = rows.shift().map(h => (h || "").trim());
    return rows
      .filter(r => r.some(v => (v || "").trim() !== ""))
      .map(r => {
        const o = {};
        header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
        // 数値化
        o.minPlayers = Number(o.minPlayers || 0);
        o.maxPlayers = Number(o.maxPlayers || 0);
        o.playTime = Number(o.playTime || 0);
        return o;
      });
  }

  function uniq(arr){ return [...new Set(arr)].filter(Boolean); }

  function buildOwnerOptions() {
    const owners = uniq(all.map(x => x.owner)).sort((a,b)=>a.localeCompare(b,'ja'));
    els.owner.innerHTML = `<option value="">全員</option>` + owners.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
  }

  function escapeHtml(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function matchFilters(item) {
    const q = els.q.value.trim().toLowerCase();
    const p = els.players.value ? Number(els.players.value) : null;
    const t = els.time.value ? Number(els.time.value) : null;
    const o = els.owner.value;

    const title = (item.title || "").toLowerCase();
    if (q && !title.includes(q)) return false;

    if (p !== null) {
      if (p >= 5) {
        if (!(item.maxPlayers >= 5)) return false;
      } else {
        if (!(item.minPlayers <= p && item.maxPlayers >= p)) return false;
      }
    }

    if (t !== null) {
      if (t === 9999) {
        if (!(item.playTime >= 91)) return false;
      } else {
        if (!(item.playTime > 0 && item.playTime <= t)) return false;
      }
    }

    if (o && item.owner !== o) return false;

    return true;
  }

  function render() {
    const filtered = all.filter(matchFilters);

    els.count.textContent = filtered.length;

    els.grid.innerHTML = filtered.map(x => {
      const players = (x.minPlayers && x.maxPlayers)
        ? `${x.minPlayers}〜${x.maxPlayers}人`
        : `人数不明`;
      const time = x.playTime ? `${x.playTime}分` : `時間不明`;
      const genre = x.genre ? `<span class="pill">${escapeHtml(x.genre)}</span>` : "";
      const owner = x.owner ? `<span class="pill">所持：${escapeHtml(x.owner)}</span>` : `<span class="pill">所持：不明</span>`;
      const note = x.note ? `<div class="note">${escapeHtml(x.note)}</div>` : "";

      const thumb = x.imageUrl
        ? `<div class="thumb"><img src="${escapeHtml(x.imageUrl)}" alt="${escapeHtml(x.title)}"></div>`
        : `<div class="thumb">画像なし</div>`;

      return `
        <div class="card">
          ${thumb}
          <div class="content">
            <div class="title">${escapeHtml(x.title || "（タイトル未入力）")}</div>
            <div class="row">
              <span class="pill">${players}</span>
              <span class="pill">${time}</span>
              ${genre}
              ${owner}
            </div>
            ${note}
          </div>
        </div>
      `;
    }).join("");
  }

  async function init(){
    if (CSV_URL.includes("PASTE_YOUR_CSV_URL_HERE")) {
      els.grid.innerHTML = `<div style="color:#a1a1aa">CSV_URL を自分のスプレッドシートのCSVリンクに差し替えてください。</div>`;
      return;
    }
    const res = await fetch(CSV_URL, { cache: "no-store" });
    const text = await res.text();
    all = parseCSV(text);

    buildOwnerOptions();
    render();
  }

  ["input","change"].forEach(ev => {
    els.q.addEventListener(ev, render);
    els.players.addEventListener(ev, render);
    els.time.addEventListener(ev, render);
    els.owner.addEventListener(ev, render);
  });

  els.reset.addEventListener("click", () => {
    els.q.value = "";
    els.players.value = "";
    els.time.value = "";
    els.owner.value = "";
    render();
  });

  init();
</script>
</body>
</html>
