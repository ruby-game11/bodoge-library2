<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ボドゲ部ライブラリ</title>

  <!-- ゆるかわ（ちいかわ“っぽい”雰囲気のUI：丸い・パステル・ふわふわ） -->
  <style>
    :root{
      --pink:#ffd6e7;
      --peach:#ffe9d6;
      --mint:#d9f7f2;
      --sky:#e3f0ff;
      --yellow:#fff5c4;
      --line:#ffd0e0;
      --text:#444;
      --muted:#6b7280;
      --cardShadow: 0 10px 30px rgba(0,0,0,.06);
    }

    body{
      margin:0;
      font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
      background: linear-gradient(180deg,#fff0f6,#f7fbff);
      color:var(--text);
      overflow-x:hidden;
    }

    /* うっすらドット（ゆるさ） */
    body:before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 140, 180, .35) 0 2px, transparent 3px),
        radial-gradient(circle at 20% 80%, rgba(120, 220, 210, .35) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 30%, rgba(140, 190, 255, .35) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 85%, rgba(255, 210, 120, .35) 0 2px, transparent 3px);
      opacity:.7;
    }

    header{
      padding:28px 16px 10px;
      text-align:center;
      max-width:1100px;
      margin:0 auto;
      position:relative;
      z-index:1;
    }

    h1{
      font-size:32px;
      margin:0;
      letter-spacing:.04em;
    }

    .sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
      position:relative;
      z-index:1;
    }

    .panel{
      background:white;
      border-radius:22px;
      padding:16px;
      border:3px solid var(--line);
      box-shadow: var(--cardShadow);
    }

    .controls{
      display:grid;
      grid-template-columns: 1.4fr .8fr .8fr .8fr;
      gap:10px;
    }
    @media (max-width:900px){
      .controls{ grid-template-columns: 1fr 1fr; }
    }
    @media (max-width:520px){
      .controls{ grid-template-columns: 1fr; }
    }

    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin-bottom:6px;
    }

    input,select{
      width:100%;
      box-sizing:border-box;
      border-radius:16px;
      border:2px solid var(--line);
      padding:10px 12px;
      background:#fff;
      outline:none;
    }
    input::placeholder{ color:#9aa0a6; }

    .meta{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:12px;
    }

    .btn{
      border-radius:16px;
      border:none;
      background:var(--pink);
      padding:9px 14px;
      font-weight:800;
      cursor:pointer;
      box-shadow: 0 6px 0 rgba(255, 140, 180, .35);
    }
    .btn:hover{ filter:brightness(1.03); transform: translateY(-1px); }
    .btn:active{ transform: translateY(0px); box-shadow: 0 4px 0 rgba(255, 140, 180, .30); }

    .grid{
      margin-top:18px;
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
    }
    @media (min-width:980px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width:600px){
      .grid{ grid-template-columns: 1fr; }
    }

    /* ★ 画像左 / 文章右（全部右側） */
    .card{
      background:white;
      border-radius:22px;
      border:3px solid var(--line);
      overflow:hidden;
      box-shadow: var(--cardShadow);
      display:grid;
      grid-template-columns: 150px 1fr; /* 左：画像 / 右：文章 */
      min-height:140px;
      transition:.15s;
    }
    .card:hover{ transform: translateY(-2px); }

    /* 画像エリア（リンクにも対応） */
    .thumb{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:140px;
      height:100%;
      background: linear-gradient(180deg,var(--sky),var(--mint));
      color:#7b8794;
      font-size:12px;
      text-decoration:none;
      overflow:hidden;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit: contain;
      object-position: center;
      display:block;
    }

    /* 公式バッジ */
    .thumb.is-link::after{
      content:"公式へ";
      position:absolute;
      bottom:8px;
      right:8px;
      background:#ff8ab0;
      color:#fff;
      font-size:11px;
      font-weight:800;
      padding:3px 8px;
      border-radius:999px;
      box-shadow: 0 6px 16px rgba(0,0,0,.10);
    }

    .thumb.is-link{ cursor:pointer; }
    .thumb.is-link:hover img{ transform: scale(1.03); transition:.2s; }

    .content{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .title{
      font-weight:900;
      margin:0;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .title:before{ content:"🎲"; }

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      font-size:12px;
      color:#555;
    }

    .pill{
      background:var(--yellow);
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      border:1px solid rgba(0,0,0,.04);
    }

    .note{
      margin-top:2px;
      font-size:12px;
      background:var(--peach);
      padding:8px 10px;
      border-radius:14px;
      line-height:1.35;
    }

    /* スマホは縦に戻す（見やすい） */
    @media (max-width:600px){
      .card{ grid-template-columns: 1fr; }
      .thumb{ min-height:120px; }
    }

    .footer{
      text-align:center;
      margin:18px 0 30px;
      font-size:12px;
      color:var(--muted);
      position:relative;
      z-index:1;
    }
  </style>
</head>

<body>
  <header>
    <h1>🎲 ボドゲ部ライブラリ 🧸</h1>
    <div class="sub">みんなの所持ボードゲームを検索・絞り込みできる共有ページ</div>
  </header>

  <div class="wrap">
    <div class="panel">
      <div class="controls">
        <div>
          <label>タイトル検索</label>
          <input id="q" placeholder="例：カタン / ドミニオン / テラフォ…" />
        </div>

        <div>
          <label>人数（含まれるゲーム）</label>
          <select id="players">
            <option value="">指定なし</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人以上</option>
          </select>
        </div>

        <div>
          <label>プレイ時間（分）</label>
          <select id="time">
            <option value="">指定なし</option>
            <option value="30">〜30</option>
            <option value="60">〜60</option>
            <option value="90">〜90</option>
            <option value="9999">90以上</option>
          </select>
        </div>

        <div>
          <label>所持者</label>
          <select id="owner">
            <option value="">全員</option>
          </select>
        </div>
      </div>

      <div class="meta">
        <div><span id="count">0</span> 件</div>
        <button class="btn" id="reset">リセット</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    データ更新：Googleスプレッドシートに追加するだけ（公式URLは <b>officialUrl</b> 列に入れてね）
  </div>

<script>
  // ★あなたの公開CSV URL（設定済み）
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrNGoGsxMqbG2ne7A9eSSCRBSKPfo_6llIEZ6pO1KTX3Le8rA6pgLwYl-cyVXbdaa-dlGIVEE2wSax/pub?gid=0&single=true&output=csv";

  const els = {
    q: document.getElementById("q"),
    players: document.getElementById("players"),
    time: document.getElementById("time"),
    owner: document.getElementById("owner"),
    grid: document.getElementById("grid"),
    count: document.getElementById("count"),
    reset: document.getElementById("reset"),
  };

  let all = [];

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function safeUrl(u){
    const s = String(u ?? "").trim();
    if (!s) return "";
    // http/https のみ許可（安全のため）
    if (/^https?:\/\/\S+/i.test(s)) return s;
    return "";
  }

  function parseCSV(text) {
    // GoogleのCSV出力想定：ダブルクォート・改行・カンマ対応の簡易パーサ
    const rows = [];
    let row = [], cur = "", inQ = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];

      if (c === '"') {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        row.push(cur); cur = "";
      } else if ((c === '\n' || c === '\r') && !inQ) {
        if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
        cur = ""; row = [];
        if (c === '\r' && text[i+1] === '\n') i++;
      } else {
        cur += c;
      }
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }

    const header = (rows.shift() || []).map(h => (h || "").trim());

    return rows
      .filter(r => r.some(v => (v || "").trim() !== ""))
      .map(r => {
        const o = {};
        header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());

        // 数値化
        o.minPlayers = Number(o.minPlayers || 0);
        o.maxPlayers = Number(o.maxPlayers || 0);
        o.playTime = Number(o.playTime || 0);

        // URL正規化（安全）
        o.imageUrl = safeUrl(o.imageUrl);
        o.officialUrl = safeUrl(o.officialUrl);

        return o;
      });
  }

  function uniq(arr){ return [...new Set(arr)].filter(Boolean); }

  function buildOwnerOptions() {
    const owners = uniq(all.map(x => x.owner)).sort((a,b)=>a.localeCompare(b,'ja'));
    els.owner.innerHTML =
      `<option value="">全員</option>` +
      owners.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
  }

  function matchFilters(item) {
    const q = els.q.value.trim().toLowerCase();
    const p = els.players.value ? Number(els.players.value) : null;
    const t = els.time.value ? Number(els.time.value) : null;
    const o = els.owner.value;

    const title = (item.title || "").toLowerCase();
    if (q && !title.includes(q)) return false;

    if (p !== null) {
      if (p >= 5) {
        if (!(item.maxPlayers >= 5)) return false;
      } else {
        if (!(item.minPlayers <= p && item.maxPlayers >= p)) return false;
      }
    }

    if (t !== null) {
      if (t === 9999) {
        if (!(item.playTime >= 91)) return false;
      } else {
        if (!(item.playTime > 0 && item.playTime <= t)) return false;
      }
    }

    if (o && item.owner !== o) return false;

    return true;
  }

  function render() {
    const filtered = all.filter(matchFilters);
    filtered.sort((a,b)=> (a.tier || 999) - (b.tier || 999));
    els.count.textContent = filtered.length;

    if (filtered.length === 0) {
      els.grid.innerHTML = `<div style="padding:18px;color:#6b7280;">該当するゲームがありませんでした 🥲</div>`;
      return;
    }

    els.grid.innerHTML = filtered.map(x => {
      const players = (x.minPlayers && x.maxPlayers)
        ? `${x.minPlayers}〜${x.maxPlayers}人`
        : `人数不明`;

      const time = x.playTime ? `${x.playTime}分` : `時間不明`;
      const genre = x.genre ? `<span class="pill">${escapeHtml(x.genre)}</span>` : "";
      const owner = x.owner ? `<span class="pill">所持：${escapeHtml(x.owner)}</span>` : `<span class="pill">所持：不明</span>`;
      const note = x.note ? `<div class="note">${escapeHtml(x.note)}</div>` : "";

      // ★画像クリック → officialUrl（なければリンク無し）
      let thumbHtml = "";
      if (x.imageUrl) {
        if (x.officialUrl) {
          thumbHtml = `
            <a class="thumb is-link" href="${escapeHtml(x.officialUrl)}" target="_blank" rel="noopener noreferrer">
              <img src="${escapeHtml(x.imageUrl)}" alt="${escapeHtml(x.title || "")}">
            </a>`;
        } else {
          thumbHtml = `
            <div class="thumb">
              <img src="${escapeHtml(x.imageUrl)}" alt="${escapeHtml(x.title || "")}">
            </div>`;
        }
      } else {
        thumbHtml = `<div class="thumb">画像なし</div>`;
      }

      return `
        <div class="card">
          ${thumbHtml}
          <div class="content">
            <div class="title">${escapeHtml(x.title || "（タイトル未入力）")}</div>
            <div class="row">
              <span class="pill">${players}</span>
              <span class="pill">${time}</span>
              ${genre}
              ${owner}
            </div>
            ${note}
          </div>
        </div>
      `;
    }).join("");
  }

  async function init(){
    try{
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
      const text = await res.text();
      all = parseCSV(text);

      buildOwnerOptions();
      render();
    }catch(e){
      console.error(e);
      els.grid.innerHTML = `
        <div style="padding:18px;color:#6b7280;">
          CSVの読み込みに失敗しました。<br>
          ・スプレッドシートが「ウェブに公開」になっているか<br>
          ・CSV_URLが正しいか<br>
          を確認してください。
        </div>`;
    }
  }

  ["input","change"].forEach(ev => {
    els.q.addEventListener(ev, render);
    els.players.addEventListener(ev, render);
    els.time.addEventListener(ev, render);
    els.owner.addEventListener(ev, render);
  });

  els.reset.addEventListener("click", () => {
    els.q.value = "";
    els.players.value = "";
    els.time.value = "";
    els.owner.value = "";
    render();
  });

  init();
</script>
</body>
</html>
