<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ほどげ部ライブラリ</title>
<style>
:root{
  --pink:#ffd6e7;
  --peach:#ffe9d6;
  --mint:#d9f7f2;
  --sky:#e3f0ff;
  --yellow:#fff5c4;
  --line:#ffd0e0;
  --text:#444;
}

body{
  margin:0;
  font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","Noto Sans JP",sans-serif;
  background: linear-gradient(180deg,#fff0f6,#f7fbff);
  color:var(--text);
}

header{
  padding:30px 16px 10px;
  text-align:center;
}

h1{
  font-size:32px;
  margin:0;
}

h1:before{
  content:"🎲 ";
}

.sub{
  margin-top:6px;
  font-size:14px;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.panel{
  background:white;
  border-radius:20px;
  padding:16px;
  border:3px solid var(--line);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:10px;
}

@media (max-width:800px){
  .controls{grid-template-columns:1fr 1fr;}
}

input,select{
  border-radius:16px;
  border:2px solid var(--line);
  padding:10px;
  background:#fff;
}

.meta{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

.btn{
  border-radius:16px;
  border:none;
  background:var(--pink);
  padding:8px 14px;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

@media (max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

.card{
  background:#fff;
  border:3px solid #ffd6e7;
  box-shadow:0 6px 0 #ffd6e7;
}

.card:hover{
  transform:translateY(-4px);
}

.thumb{
  height:100%;
  min-height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--sky),var(--mint));
}

.content{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.title{
  font-weight:bold;
  margin-bottom:6px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.pill{
  background:var(--yellow);
  border-radius:999px;
  padding:3px 8px;
  font-size:12px;
}

.note{
  margin-top:6px;
  font-size:12px;
  background:var(--peach);
  padding:6px;
  border-radius:10px;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
}

  @media (max-width:600px){
  .card{
    grid-template-columns:1fr;
  }
}
  
</style>
</head>
<body>
  <header>
    <h1>ほどげ部ライブラリ</h1>
    <div class="sub">みんなの所持ボードゲームを検索・絞り込みできる共有ページ</div>
  </header>

  <div class="wrap">
    <div class="panel">
      <div class="controls">
        <div>
          <label>タイトル検索</label>
          <input id="q" placeholder="例：カタン / ドミニオン / テラフォ…" />
        </div>
        <div>
          <label>人数（含まれるゲーム）</label>
          <select id="players">
            <option value="">指定なし</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人以上</option>
          </select>
        </div>
        <div>
          <label>プレイ時間（分）</label>
          <select id="time">
            <option value="">指定なし</option>
            <option value="30">〜30</option>
            <option value="60">〜60</option>
            <option value="90">〜90</option>
            <option value="9999">90以上</option>
          </select>
        </div>
        <div>
          <label>所持者</label>
          <select id="owner">
            <option value="">全員</option>
          </select>
        </div>
      </div>

      <div class="meta">
        <div><span id="count">0</span> 件</div>
        <button class="btn" id="reset">リセット</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="footer">
    データ更新：Googleスプレッドシートに追加するだけ。画像URLは任意です。<br/>
    作成：ほどげ部ライブラリ（GitHub Pages）
  </div>

<script>
  // ★ここを自分のCSV URLに差し替え
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrNGoGsxMqbG2ne7A9eSSCRBSKPfo_6llIEZ6pO1KTX3Le8rA6pgLwYl-cyVXbdaa-dlGIVEE2wSax/pub?gid=0&single=true&output=csv";
  const els = {
    q: document.getElementById("q"),
    players: document.getElementById("players"),
    time: document.getElementById("time"),
    owner: document.getElementById("owner"),
    grid: document.getElementById("grid"),
    count: document.getElementById("count"),
    reset: document.getElementById("reset"),
  };

  let all = [];

  function parseCSV(text) {
    // ざっくりCSV（Google gviz CSV想定：ダブルクォート対応）
    const rows = [];
    let row = [], cur = "", inQ = false;
    for (let i=0; i<text.length; i++){
      const c = text[i];
      if (c === '"' ) {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        row.push(cur); cur = "";
      } else if ((c === '\n' || c === '\r') && !inQ) {
        if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
        cur = ""; row = [];
        if (c === '\r' && text[i+1] === '\n') i++;
      } else {
        cur += c;
      }
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }

    const header = rows.shift().map(h => (h || "").trim());
    return rows
      .filter(r => r.some(v => (v || "").trim() !== ""))
      .map(r => {
        const o = {};
        header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
        // 数値化
        o.minPlayers = Number(o.minPlayers || 0);
        o.maxPlayers = Number(o.maxPlayers || 0);
        o.playTime = Number(o.playTime || 0);
        return o;
      });
  }

  function uniq(arr){ return [...new Set(arr)].filter(Boolean); }

  function buildOwnerOptions() {
    const owners = uniq(all.map(x => x.owner)).sort((a,b)=>a.localeCompare(b,'ja'));
    els.owner.innerHTML = `<option value="">全員</option>` + owners.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
  }

  function escapeHtml(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function matchFilters(item) {
    const q = els.q.value.trim().toLowerCase();
    const p = els.players.value ? Number(els.players.value) : null;
    const t = els.time.value ? Number(els.time.value) : null;
    const o = els.owner.value;

    const title = (item.title || "").toLowerCase();
    if (q && !title.includes(q)) return false;

    if (p !== null) {
      if (p >= 5) {
        if (!(item.maxPlayers >= 5)) return false;
      } else {
        if (!(item.minPlayers <= p && item.maxPlayers >= p)) return false;
      }
    }

    if (t !== null) {
      if (t === 9999) {
        if (!(item.playTime >= 91)) return false;
      } else {
        if (!(item.playTime > 0 && item.playTime <= t)) return false;
      }
    }

    if (o && item.owner !== o) return false;

    return true;
  }

  function render() {
    const filtered = all.filter(matchFilters);

    els.count.textContent = filtered.length;

    els.grid.innerHTML = filtered.map(x => {
      const players = (x.minPlayers && x.maxPlayers)
        ? `${x.minPlayers}〜${x.maxPlayers}人`
        : `人数不明`;
      const time = x.playTime ? `${x.playTime}分` : `時間不明`;
      const genre = x.genre ? `<span class="pill">${escapeHtml(x.genre)}</span>` : "";
      const owner = x.owner ? `<span class="pill">所持：${escapeHtml(x.owner)}</span>` : `<span class="pill">所持：不明</span>`;
      const note = x.note ? `<div class="note">${escapeHtml(x.note)}</div>` : "";

      const thumb = x.imageUrl
        ? `<div class="thumb"><img src="${escapeHtml(x.imageUrl)}" alt="${escapeHtml(x.title)}"></div>`
        : `<div class="thumb">画像なし</div>`;

      return `
        <div class="card">
          ${thumb}
          <div class="content">
            <div class="title">${escapeHtml(x.title || "（タイトル未入力）")}</div>
            <div class="row">
              <span class="pill">${players}</span>
              <span class="pill">${time}</span>
              ${genre}
              ${owner}
            </div>
            ${note}
          </div>
        </div>
      `;
    }).join("");
  }

  async function init(){
    if (CSV_URL.includes("PASTE_YOUR_CSV_URL_HERE")) {
      els.grid.innerHTML = `<div style="color:#a1a1aa">CSV_URL を自分のスプレッドシートのCSVリンクに差し替えてください。</div>`;
      return;
    }
    const res = await fetch(CSV_URL, { cache: "no-store" });
    const text = await res.text();
    all = parseCSV(text);

    buildOwnerOptions();
    render();
  }

  ["input","change"].forEach(ev => {
    els.q.addEventListener(ev, render);
    els.players.addEventListener(ev, render);
    els.time.addEventListener(ev, render);
    els.owner.addEventListener(ev, render);
  });

  els.reset.addEventListener("click", () => {
    els.q.value = "";
    els.players.value = "";
    els.time.value = "";
    els.owner.value = "";
    render();
  });

  init();
</script>
</body>
</html>
